---
name: Setup Project
description: Setup Node.js, pnpm, and install dependencies for the portfolio project

inputs:
  node-version:
    description: Node.js version to setup
    required: false
    default: '22'
  install-dependencies:
    description: Whether to install dependencies
    required: false
    default: 'true'
  install-playwright:
    description: Whether to install Playwright browsers
    required: false
    default: 'false'
  playwright-browsers:
    description: Playwright browsers to install (space-separated)
    required: false
    default: chromium

outputs:
  node-version:
    description: The Node.js version that was setup
    value: ${{ steps.setup-node.outputs.node-version }}
  cache-hit:
    description: Whether pnpm cache was hit
    value: ${{ steps.setup-pnpm.outputs.cache-hit }}
  playwright-version:
    description: The Playwright version (empty if install-playwright is false)
    value: ${{ steps.playwright-version.outputs.version }}
  playwright-cache-hit:
    description: Whether Playwright browser cache was hit
    value: ${{ steps.playwright-cache.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Setup pnpm
      id: setup-pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

    - name: Setup Node.js
      id: setup-node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      if: inputs.install-dependencies == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Verify installation
      if: inputs.install-dependencies == 'true'
      shell: bash
      run: |
        echo "Node.js version: $(node --version)"
        echo "pnpm version: $(pnpm --version)"
        echo "Dependencies installed successfully"

    # Playwright browser setup (opt-in)
    - name: Get Playwright version
      if: inputs.install-playwright == 'true'
      id: playwright-version
      shell: bash
      run: echo "version=$(pnpm list @playwright/test --depth=0 --json | jq -r '.[] | .devDependencies | .["@playwright/test"] | .version')" >> $GITHUB_OUTPUT

    - name: Cache Playwright browsers
      if: inputs.install-playwright == 'true'
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

    - name: Install Playwright browsers
      if: inputs.install-playwright == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
      shell: bash
      run: pnpm exec playwright install --with-deps ${{ inputs.playwright-browsers }}

    - name: Ensure Playwright browsers installed
      if: inputs.install-playwright == 'true'
      shell: bash
      run: pnpm exec playwright install ${{ inputs.playwright-browsers }}
