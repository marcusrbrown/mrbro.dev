---
name: E2E Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      browser:
        description: Browser to test
        required: false
        default: all
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit
      test-type:
        description: Type of tests to run
        required: false
        default: all
        type: choice
        options:
          - all
          - e2e
          - visual
          - accessibility

permissions:
  contents: read
  actions: read
  pages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup E2E Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup project
        uses: ./.github/actions/setup
        with:
          install-playwright: 'true'

  build-for-tests:
    name: Build for Testing
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup project
        uses: ./.github/actions/setup

      - name: Build project
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-artifacts-e2e
          path: dist/
          retention-days: 1

  e2e-tests:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: [setup, build-for-tests]
    strategy:
      fail-fast: false
      matrix:
        # browser: [chromium, firefox, webkit]
        browser: [chromium]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup project
        uses: ./.github/actions/setup
        with:
          install-playwright: 'true'

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-artifacts-e2e
          path: dist/

      - name: Run E2E tests
        run: pnpm exec playwright test --project=${{ matrix.browser }}-desktop
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:4173

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: e2e-results-${{ matrix.browser }}
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    needs: [setup, build-for-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup project
        uses: ./.github/actions/setup
        with:
          install-playwright: 'true'

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-artifacts-e2e
          path: dist/

      - name: Run visual regression tests
        run: pnpm run test:visual
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:4173

      - name: Upload visual test artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: visual-test-results
          path: |
            test-results/
            tests/visual/**/*-actual.png
            tests/visual/**/*-diff.png
          retention-days: 30

  accessibility-tests:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    needs: [setup, build-for-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup project
        uses: ./.github/actions/setup
        with:
          install-playwright: 'true'

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-artifacts-e2e
          path: dist/

      - name: Run accessibility tests
        run: pnpm run test:accessibility
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:4173

      - name: Upload accessibility test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: accessibility-test-results
          path: |
            test-results/
            accessibility-reports/
          retention-days: 30

  test-summary:
    name: Test Summary & Badge Generation
    runs-on: ubuntu-latest
    needs: [e2e-tests, visual-regression, accessibility-tests]
    if: always()
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup project
        uses: ./.github/actions/setup

      - name: Download all test artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: '*-test-results*'
          merge-multiple: true
          path: test-artifacts/

      - name: Download E2E results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: 'e2e-results-*'
          merge-multiple: true
          path: test-artifacts/e2e/

      - name: Generate test summary
        run: |
          echo "# E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check test results
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.e2e-tests.result }}" == "success" ]]; then
            echo "✅ **E2E Tests**: All browsers passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **E2E Tests**: Some tests failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.visual-regression.result }}" == "success" ]]; then
            echo "✅ **Visual Regression Tests**: All screenshots matched" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Visual Regression Tests**: Some screenshots differed or tests failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.accessibility-tests.result }}" == "success" ]]; then
            echo "✅ **Accessibility Tests**: WCAG 2.1 AA passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Accessibility Tests**: Some accessibility violations found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Generate badges
        run: pnpm run badges

      - name: Upload badge data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: badge-data
          path: badges/
          retention-days: 30

      - name: Cleanup old artifacts
        run: pnpm run artifacts:cleanup
        continue-on-error: true

      - name: Generate artifact management report
        run: pnpm run artifacts report
        continue-on-error: true

      - name: Upload artifact report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: artifact-management-report
          path: test-dashboard/artifact-report.json
          retention-days: 90

  notification:
    name: Test Notifications
    runs-on: ubuntu-latest
    needs: [test-summary, e2e-tests, visual-regression, accessibility-tests]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - id: get-app-token
        name: Get Workflow Access Token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.APPLICATION_ID }}
          permission-contents: read
          permission-pull-requests: write
          private-key: ${{ secrets.APPLICATION_PRIVATE_KEY }}

      - name: Post PR Comment
        env:
          GH_TOKEN: ${{ steps.get-app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          STATUS: ${{ (needs.e2e-tests.result == 'success' && needs.visual-regression.result == 'success' && needs.accessibility-tests.result == 'success') && 'success' || 'failure' }}
          E2E_RESULT: ${{ needs.e2e-tests.result }}
          VISUAL_RESULT: ${{ needs.visual-regression.result }}
          A11Y_RESULT: ${{ needs.accessibility-tests.result }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          MARKER="<!-- E2E_TEST_NOTIFICATION_v1 -->"
          DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          E2E_ICON=$([[ "$E2E_RESULT" == "success" ]] && echo "✅" || echo "❌")
          VISUAL_ICON=$([[ "$VISUAL_RESULT" == "success" ]] && echo "✅" || echo "❌")
          A11Y_ICON=$([[ "$A11Y_RESULT" == "success" ]] && echo "✅" || echo "❌")

          if [[ "$STATUS" == "success" ]]; then
            BODY="$MARKER

          ✅ **E2E Testing Passed**

          All accessibility, visual, and functional tests passed successfully.

          | Suite | Result |
          |-------|--------|
          | ${E2E_ICON} E2E Tests | ${E2E_RESULT} |
          | ${VISUAL_ICON} Visual Regression | ${VISUAL_RESULT} |
          | ${A11Y_ICON} Accessibility (WCAG 2.1 AA) | ${A11Y_RESULT} |

          **Workflow Run**: [#${RUN_NUMBER}](${RUN_URL})
          **Test Date**: $DATE"
          else
            BODY="$MARKER

          ❌ **E2E Testing Failed**

          Some tests failed. Please review the test results and fix any failures before merging.

          | Suite | Result |
          |-------|--------|
          | ${E2E_ICON} E2E Tests | ${E2E_RESULT} |
          | ${VISUAL_ICON} Visual Regression | ${VISUAL_RESULT} |
          | ${A11Y_ICON} Accessibility (WCAG 2.1 AA) | ${A11Y_RESULT} |

          **Workflow Run**: [#${RUN_NUMBER}](${RUN_URL})
          **Test Date**: $DATE"
          fi

          COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '[.[] | select(.body | contains("E2E_TEST_NOTIFICATION_v1"))] | last | .id // empty')

          if [[ -n "$COMMENT_ID" ]]; then
            gh api --method PATCH "repos/${REPO}/issues/comments/${COMMENT_ID}" -f body="$BODY"
          else
            gh api --method POST "repos/${REPO}/issues/${PR_NUMBER}/comments" -f body="$BODY"
          fi
